version: "3.9"

services:
  gateway:
    build: .
    command: ["python", "gateway_service.py", "--port", "8082"]
    environment:
      COSTS_SERVICE_URL: http://costs_usage:8080
      DOCUMENT_GENERATOR_SERVICE_URL: http://document_generator:8080
      CHECKOUT_SERVICE_URL: http://checkout:8080
      PAYMENTS_SERVICE_URL: http://payments:8080
    ports:
      - "8082:8082"
    depends_on:
      - costs_usage
      - document_generator
      - checkout
      - payments

  costs_usage:
    build: .
    command: ["python", "costs_usage_app.py", "--port", "8080"]
    environment:
      OS_AUTH_URL: ${OS_AUTH_URL:-}
      OS_USERNAME: ${OS_USERNAME:-}
      OS_PASSWORD: ${OS_PASSWORD:-}
      OS_PROJECT_NAME: ${OS_PROJECT_NAME:-}
      OS_PROJECT_ID: ${OS_PROJECT_ID:-}
      OS_USER_DOMAIN_NAME: ${OS_USER_DOMAIN_NAME:-Default}
      OS_PROJECT_DOMAIN_NAME: ${OS_PROJECT_DOMAIN_NAME:-Default}
      OS_REGION_NAME: ${OS_REGION_NAME:-}
      OS_INTERFACE: ${OS_INTERFACE:-public}
      CLOUDKITTY_ENDPOINT: ${CLOUDKITTY_ENDPOINT:-}
      CLOUDKITTY_CURRENCY: ${CLOUDKITTY_CURRENCY:-DKK}
      OS_VERIFY: ${OS_VERIFY:-true}

  document_generator:
    build: .
    command: ["python", "document_generator_app.py", "--port", "8080"]
    environment:
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_API_URL: ${BREVO_API_URL:-https://api.brevo.com/v3/smtp/email}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-}

  checkout:
    build: .
    command: ["python", "checkout_app.py", "--port", "8080"]
    environment:
      REVOLUT_API_KEY: ${REVOLUT_API_KEY:-}
      DOCUMENT_GENERATOR_SERVICE_URL: http://document_generator:8080
      REVOLUT_BUSINESS_API_URL: ${REVOLUT_BUSINESS_API_URL:-https://sandbox-merchant.revolut.com}
      REVOLUT_ORDERS_PATH: ${REVOLUT_ORDERS_PATH:-/api/orders}

  payments:
    build: .
    command: ["python", "payments_app.py", "--port", "8080"]
    environment:
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://localhost:9200}
